spring.application.name=ip_metric_consumer

kafka.bootstrap-servers=localhost:9094,localhost:9095,localhost:9096
kafka.consumer.group-id=ip-metrics-consumer-group
kafka.consumer.auto-offset-reset=earliest

server.port=8082

# Kafka Configs 

spring.kafka.consumer.bootstrap-servers=${kafka.bootstrap-servers}
spring.kafka.consumer.group-id=${kafka.consumer.group-id}
spring.kafka.consumer.auto-offset-reset=${kafka.consumer.auto-offset-reset}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.listener.missing-topics-mode=WARN

# PostgreSQL Configs
spring.datasource.url=jdbc:postgresql://localhost:5432/context-db
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect